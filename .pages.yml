content:
  - name: "series"
    label: "المسلسلات والأنمي"
    filename: "src/content/series/[name].json" # اسم الملف سيكون حسب العنوان
    type: collection # أو type: file إذا كنت تستخدم ملف واحد للكل
    path: "src/content/series" # مجلد المحتوى

    fields:
  - name: title
    label: "عنوان الأنمي"
    type: string
    required: true

  - name: slug
    label: "رابط الصفحة (Slug)"
    type: string
    required: true
    # نصيحة: Pages CMS يدعم التوليد التلقائي للرابط من العنوان في بعض الإعدادات

  - name: image
    label: "بوستر الأنمي"
    type: image

  - name: description
    label: "قصة الأنمي"
    type: rich-text # تحويله لـ rich-text يتيح لك تنسيق النص (B, I, Lists)

  - name: genres
    label: "تصنيف الأنمي"
    type: select
    list: true # هذا ما يجعله اختيار متعدد
    options:
      - { value: "action", label: "أكشن" }
      - { value: "comedy", label: "كوميديا" }
      - { value: "romance", label: "رومانسي" }
      - { value: "scifi", label: "خيال علمي" }
      - { value: "drama", label: "دراما" }

  - name: keywords
    label: "الكلمات المفتاحية"
    type: string
    list: true # سيظهر كقائمة بسيطة (Tags) بدلاً من Object معقد

  - name: seasons
    label: "المواسم"
    type: object
    list: true
    fields:
      - { name: "season_number", label: "رقم الموسم", type: number }
      - { name: "season_title", label: "عنوان الموسم", type: string }
      
      - name: "episodes"
        label: "قائمة الحلقات"
        type: object
        list: true
        fields:
          - { name: "episode_number", label: "رقم الحلقة", type: number }
          - { name: "episode_title", label: "عنوان الحلقة (اختياري)", type: string }
          - { name: "video_url", label: "رابط المشاهدة", type: string }
          - { name: "thumbnail", label: "صورة مصغرة للحلقة", type: image }
          - { name: "duration", label: "مدة الحلقة", type: string }