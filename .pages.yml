fields:
  - { name: "title", label: "عنوان الأنمي", type: string, required: true }
  
  # تحسين: إضافة حقل الرابط الدائم (slug) بشكل صحيح
  - { name: "slug", label: "رابط الصفحة (Slug)", type: string, required: true }
  
  # إضافة: صورة الغلاف (مهمة جداً لأي موقع أنمي)
  - { name: "image", label: "صورة الغلاف", type: image }

  - { name: "description", label: "وصف الأنمي", type: text }

  # تحسين: استخدام النوع 'select' مع خاصية 'list: true' للاختيار المتعدد
  - name: "genres"
    label: "تصنيف الأنمي"
    type: select
    list: true
    options:
      - { value: "action", label: "أكشن" }
      - { value: "comedy", label: "كوميديا" }
      - { value: "romance", label: "رومانسي" }
      - { value: "scifi", label: "خيال علمي" }
      - { value: "drama", label: "دراما" }

  # تحسين: الكلمات المفتاحية يفضل أن تكون حقل 'string' مع 'list: true' لتبسيط الإدخال
  - name: "keywords"
    label: "الكلمات المفتاحية"
    type: string
    list: true

  # هيكلة المواسم والحلقات
  - name: "seasons"
    label: "المواسم"
    type: object
    list: true
    fields:
      - { name: "season_number", label: "رقم الموسم", type: number }
      - { name: "season_title", label: "عنوان الموسم", type: string }
      
      - name: "episodes"
        label: "الحلقات"
        type: object
        list: true
        fields:
          - { name: "episode_number", label: "رقم الحلقة", type: number }
          - { name: "episode_title", label: "عنوان الحلقة", type: string }
          - { name: "video_url", label: "رابط الفيديو (Iframe/URL)", type: string }
          # إضافة: صورة مصغرة لكل حلقة تعطي طابعاً احترافياً
          - { name: "thumbnail", label: "صورة الحلقة", type: image }
          - { name: "duration", label: "مدة الحلقة", type: string }